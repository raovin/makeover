  template: 'if (typeof focusedApp === "undefined" || !focusedApp) return ""; const name = (focusedApp.name || focusedApp.title || "").trim(); const title = (focusedApp.title || "").trim(); if (name === "Seelen UI" && /^(Fancy Toolbar|Dock\/Taskbar|Flyouts|User Menu|Power Menu)$/.test(title)) return ""; if (/^(Windows PowerShell|PowerShell|pwsh)$/i.test(name) && /^(Apple Menu|Control Center)$/.test(title)) return ""; return name || title;'
  tooltip: 'if (typeof focusedApp === "undefined" || !focusedApp) return ""; return focusedApp.title || focusedApp.name || "";'
  badge: null
  onClick: null
  onWheelUp: null
  onWheelDown: null
  style: {maxWidth: 180}
  remoteData: {}
- id: focused-window-title-codex
  scopes:
  - FocusedApp
  template: 'if (typeof focusedApp === "undefined" || !focusedApp || !focusedApp.title) return ""; const name = (focusedApp.name || "").trim(); const title = (focusedApp.title || "").trim(); if (name === "Seelen UI" && /^(Fancy Toolbar|Dock\/Taskbar|Flyouts|User Menu|Power Menu)$/.test(title)) return ""; if (/^(Windows PowerShell|PowerShell|pwsh)$/i.test(name) && /^(Apple Menu|Control Center)$/.test(title)) return ""; if (!title || title === name) return ""; return title;'
  tooltip: 'if (typeof focusedApp === "undefined" || !focusedApp || !focusedApp.title) return ""; return focusedApp.title;'
  badge: null
  onClick: null
  onWheelUp: null
  onWheelDown: null
  style: {maxWidth: 250}
