isReorderDisabled: true
left:
- id: macmakeover-apple-menu
  scopes: []
  template: return "Apple";
  tooltip: return "";
  badge: null
  onClick: 'open("macmakeover-apple-menu:")'
  onWheelUp: null
  onWheelDown: null
  style:
    minWidth: 30
    maxWidth: 30
    width: 30
    flexShrink: 0
  remoteData: {}
- id: focused-app-name-codex
  scopes:
  - FocusedApp
  template: if (typeof focusedApp === "undefined" || !focusedApp) return ""; const name = (focusedApp.name || "").trim(); const title = (focusedApp.title || "").trim(); const shell = /^(Windows Explorer|File Explorer|Explorer|Program Manager)$/i; const helper = /^(Seelen UI|ShellHost|MacMakeover\.MenuHost)$/i; if (shell.test(name) || shell.test(title)) return "Finder"; if (helper.test(name) || helper.test(title)) return ""; if (/^(Windows PowerShell|PowerShell|pwsh)$/i.test(name) && /^(Apple Menu|Control Center|Network)$/.test(title)) return ""; return name || title;
  tooltip: if (typeof focusedApp === "undefined" || !focusedApp) return ""; return focusedApp.title || focusedApp.name || "";
  badge: null
  onClick: null
  onWheelUp: null
  onWheelDown: null
  style:
    maxWidth: 180
  remoteData: {}
- id: focused-window-title-codex
  scopes:
  - FocusedApp
  template: if (typeof focusedApp === "undefined" || !focusedApp || !focusedApp.title) return ""; const name = (focusedApp.name || "").trim(); const title = (focusedApp.title || "").trim(); const shell = /^(Windows Explorer|File Explorer|Explorer|Program Manager)$/i; const helper = /^(Seelen UI|ShellHost|MacMakeover\.MenuHost)$/i; if (shell.test(name) || shell.test(title)) return ""; if (helper.test(name) || helper.test(title)) return ""; if (/^(Windows PowerShell|PowerShell|pwsh)$/i.test(name) && /^(Apple Menu|Control Center|Network)$/.test(title)) return ""; if (!title || title === name) return ""; return title;
  tooltip: if (typeof focusedApp === "undefined" || !focusedApp || !focusedApp.title) return ""; return focusedApp.title;
  badge: null
  onClick: null
  onWheelUp: null
  onWheelDown: null
  style:
    maxWidth: 250
  remoteData: {}
center: []
right:
- '@vineeth/tb-network-status'
- id: macmakeover-bluetooth
  scopes: []
  template: return icon("LuBluetooth");
  tooltip: return "";
  badge: null
  onClick: 'open("macmakeover-bluetooth:")'
  onWheelUp: null
  onWheelDown: null
  style:
    minWidth: 28
    flexShrink: 0
    maxWidth: 28
    width: 28
  remoteData: {}
- id: macmakeover-battery-status
  scopes:
  - Power
  template: 'if (typeof batteries === "undefined" || !batteries.length) return icon("TbPlugConnected"); const pct = Math.round(batteries.reduce((total, battery) => total + battery.percentage, 0) / batteries.length); const charging = (typeof power !== "undefined" && power.acLineStatus === 1) || batteries.some((battery) => battery.state === "charging"); const lvl = pct > 90 ? icon("PiBatteryFullFill") : pct > 66 ? icon("PiBatteryHighFill") : pct > 33 ? icon("PiBatteryMediumFill") : pct > 5 ? icon("PiBatteryLowFill") : icon("PiBatteryWarning"); const out = []; if (charging) { out.push(icon("BsLightningChargeFill")); out.push(" "); } out.push(lvl); out.push(" " + pct + "%"); return out;'
  tooltip: return "";
  badge: null
  onClick: 'open("macmakeover-control-center:")'
  onWheelUp: null
  onWheelDown: null
  style:
    minWidth: 60
    flexShrink: 0
  remoteData: {}
- id: macmakeover-control-center
  scopes: []
  template: return icon("LuSlidersHorizontal");
  tooltip: return "";
  badge: null
  onClick: 'open("macmakeover-control-center:")'
  onWheelUp: null
  onWheelDown: null
  style:
    minWidth: 28
    flexShrink: 0
    maxWidth: 28
    width: 28
  remoteData: {}
- id: macmakeover-notification-center
  scopes:
  - Notifications
  template: 'const total = Math.max(0, Number(count) || 0); const glyph = dndActive ? icon("TbZzz") : total > 0 ? icon("MdNotificationsActive") : icon("MdOutlineNotifications"); return [glyph, total > 0 ? ` ${total > 99 ? "99+" : total}` : ""];'
  badge: null
  tooltip: return "";
  onClick: 'open("macmakeover-notification-center:")'
  onWheelUp: null
  onWheelDown: null
  style:
    minWidth: 34
    flexShrink: 0
    maxWidth: 52
  remoteData: {}
- id: macmakeover-date
  scopes:
  - Date
  template: 'const d = new Date(); const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"]; const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]; const hh = String(d.getHours()).padStart(2, "0"); const mm = String(d.getMinutes()).padStart(2, "0"); return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${hh}:${mm}`;'
  tooltip: return "";
  badge: null
  onClick: 'open("macmakeover-notification-center:")'
  onWheelUp: null
  onWheelDown: null
  style:
    minWidth: 104
    flexShrink: 0
  remoteData: {}
