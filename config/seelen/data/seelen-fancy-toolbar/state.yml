  template: 'if (typeof networkStatistics === "undefined") return ""; const fmt = (bits) => { const units = ["", "K", "M", "G"]; let value = bits; let unit = 0; while (value >= 1000 && unit < units.length - 1) { value /= 1000; unit++; } return value.toFixed(value >= 10 || unit === 0 ? 0 : 1) + units[unit]; }; const down = networkStatistics.reduce((total, net) => total + net.received, 0) * 8; const up = networkStatistics.reduce((total, net) => total + net.transmitted, 0) * 8; return ["↓" + fmt(down), " ", "↑" + fmt(up)];'
