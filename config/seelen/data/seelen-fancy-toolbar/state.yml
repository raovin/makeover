- id: 42f54665-c379-4f6b-86e4-9b42cbfc1e2d
  scopes:
  - Memory
  template: 'if (typeof memory === "undefined") return ""; const units = ["B", "K", "M", "G", "T"]; let total = memory.total; let used = memory.total - memory.free; let unit = 0; while (total >= 1024 && unit < units.length - 1) { total /= 1024; used /= 1024; unit++; } return [icon("FaMemory"), " ", used.toFixed(0) + "/" + total.toFixed(0) + units[unit]];'
  tooltip: 'if (typeof memory === "undefined") return ""; return "Memory: " + ((memory.total - memory.free) / 1073741824).toFixed(1) + " GB / " + (memory.total / 1073741824).toFixed(1) + " GB";'
  badge: null
